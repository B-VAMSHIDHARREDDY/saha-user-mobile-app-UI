document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-bottom:6px;\">2. How we use your data<\u002Fdiv>\n              <div style=\"margin-bottom:16px;\">Your details are shared with the assigned professional solely to complete your booking, and never sold to third parties.<\u002Fdiv>\n              <div style=\"font-weight:800; color:#12213D; margin-bottom:6px;\">3. Cancellations &amp; refunds<\u002Fdiv>\n              <div style=\"margin-bottom:16px;\">Bookings cancelled more than 12 hours before the slot qualify for a full refund, processed within 3–5 business days.<\u002Fdiv>\n              <div style=\"font-weight:800; color:#12213D; margin-bottom:6px;\">4. Contact<\u002Fdiv>\n              <div>Reach us any time from Support / Help Center inside the app.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ EMPTY / ERROR STATE ============ -->\n        <sc-if value=\"{{ isEmpty }}\">\n          <div style=\"flex:1; display:flex; flex-direction:column; animation:sahaFade .3s ease;\">\n            <div style=\"padding:16px 18px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #F2F4F9;\">\n              <span sc-camel-on-click=\"{{ back }}\" style=\"font-size:20px; cursor:pointer;\">‹<\u002Fspan>\n              <div style=\"font-size:16px; font-weight:800; color:#12213D;\">Support<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px;\">\n              <div style=\"width:90px; height:90px; border-radius:50%; background:#F2F4F9; display:flex; align-items:center; justify-content:center; font-size:34px; margin-bottom:18px;\">📭<\u002Fdiv>\n              <div style=\"font-size:16px; font-weight:800; color:#12213D; margin-bottom:6px;\">No open tickets<\u002Fdiv>\n              <div style=\"font-size:13px; color:#64748B; margin-bottom:20px;\">You haven't raised any support requests yet<\u002Fdiv>\n              <div sc-c const prev = st.pop() || 'home'; return { stack: st, screen: prev }; });\n  goHome = () => this.setState({ screen: 'home', stack: [], modal: null });\n  stop = (e) => { if (e && e.stopPropagation) e.stopPropagation(); };\n\n  goNotifications = () => this.go('notifications');\n  goSearch = () => this.go('search');\n  goCategories = () => this.go('categories');\n  goAddress = () => this.go('address');\n  goDatetime = () => this.go('datetime');\n  goPayment = () => this.go('payment');\n  goConfirmation = () => this.go('confirmation');\n  goBookingDetails = () => this.go('bookingdetails');\n  goCoupon = () => this.go('coupon');\n  goCancel = () => this.go('cancel');\n  goInvoice = () => this.go('invoice');\n  goEmpty = () => this.go('empty');\n  backToLogin = () => this.setState({ modal: 'login' });\n\n  onboardNext = () => {\n    const i = this.state.onboardIdx;\n    if (i >= 2) { this.go('location'); }\n    else this.setState({ onboardIdx: i + 1 });\n  };\n  confirmLocation = () => this.go('home');\n\n  selectCategory = (c) => this.setState(s => ({ selectedCategory: c, stack: [...s.stack, s.screen], screen: 'listing' }));\n  selectService = (s0) => {\n    if (s0.variants && s0.variants.length) {\n      this.setState(s => ({ variantBaseService: s0, stack: [...s.stack, s.screen], screen: 'variants' }));\n    } else {\n      this.setState(s => ({ selectedService: s0, detailTab: 'Description', stack: [...s.stack, s.screen], screen: 'details' }));\n    }\n  };\n  selectVariant = (v) => this.setState(s => ({ selectedService: v, detailTab: 'Description', stack: [...s.stack, s.screen], screen: 'details' }));\n  setDetailTab = (t) => this.setState({ detailTab: t.label });\n\n  bookNow = () => {\n    if (this.state.loggedIn) this.go('cart');\n    else this.setState({ modal: 'login', resumeTarget: 'cart' });\n  };\n  tabTap = (t) => {\n    if (t.key === 'account' && !this.state.loggedIn) { this.setState({ modal: 'login', resumeTarget: 'profile' }); return; }\n    if (t.key === 'account') { this.go2('profile'); return; }\n    this.go2(t.key);\n  };\n\n  onMobileChange = (e) => this.setState({ mobile: (e.target.value || '').replace(/\\D/g, '').slice(0, 10) });\n  continueLogin = () => { if (this.state.mobile.length === 10) this.setState({ modal: 'otp', otp: '' }); };\n  onOtpChange = (e) => this.setState({ otp: (e.target.value || '').replace(/\\D/g, '').slice(0, 6) });\n  verifyOtp = () => {\n    if (this.state.otp.length !== 6) return;\n    const target = this.state.resumeTarget || 'home';\n    this.setState(s => ({ loggedIn: true, modal: null, otp: '', stack: [...s.stack, s.screen], screen: target }));\n  };\n  closeModal = () => this.setState({ modal: null });\n  logout = () => this.setState({ loggedIn: false, screen: 'home', stack: [], modal: null });\n\n  onSearchChange = (e) => this.setState({ searchQuery: e.target.value });\n  selectAddress = (a) => this.setState({ addressId: a.id });\n  openAddAddress = () => this.setState(s => ({\n    editingAddressId: null, formLabel: '', formText: '', formHouseNo: '', formFloor: '', formLandmark: '', formType: 'Home',\n    mapSearchQuery: '', addAddressStep: 'map', stack: [...s.stack, s.screen], screen: 'addaddress',\n  }));\n  openEditAddress = (a) => this.setState(s => ({\n    editingAddressId: a.id, formLabel: a.label, formText: a.text, formHouseNo: '', formFloor: '', formLandmark: '',\n    formType: ['Home', 'Work', 'Other'].includes(a.label) ? a.label : 'Other',\n    addAddressStep: 'form', stack: [...s.stack, s.screen], screen: 'addaddress',\n  }));\n  deleteAddress = (a) => this.setState(s => ({\n    addressList: s.addressList.filter(x => x.id !== a.id),\n    addressId: s.addressId === a.id ? (s.addressList.find(x => x.id !== a.id) || { id: 'home' }).id : s.addressId,\n  }));\n  onFormLabelChange = (e) => this.setState({ formLabel: e.target.value });\n  onFormTextChange = (e) => this.setState({ formText: e.target.value });\n  onFormHouseNoChange = (e) => this.setState({ formHouseNo: e.targe ;\n    this.setState(s => {\n      if (s.editingAddressId) {\n        return { addressList: s.addressList.map(a => a.id === s.editingAddressId ? { ...a, label, text: fullText } : a) };\n      }\n      const newId = 'addr-' + Date.now();\n      return { addressList: [...s.addressList, { id: newId, label, text: fullText }] };\n    });\n    this.back();\n  };\n  selectDate = (d) => { if (!d.disabled) this.setState({ selectedDateISO: d.iso }); };\n  prevMonth = () => this.setState(s => ({ calendarMonthOffset: Math.max(0, s.calendarMonthOffset - 1) }));\n  nextMonth = () => this.setState(s => ({ calendarMonthOffset: s.calendarMonthOffset + 1 }));\n  selectSlot = (s0) => this.setState({ slotIdx: s0.idx });\n  selectPayment = (p) => this.setState({ paymentMethod: p.key });\n  applyCoupon = () => this.setState({ couponApplied: true, screen: 'payment' });\n  setBookingTab = (t) => this.setState({ bookingTab: t.label });\n  selectCancelReason = (r) => this.setState({ cancelReasonIdx: r.idx });\n  confirmCancel = () => this.setState(s => ({ stack: [...s.stack, s.screen], screen: 'bookingdetails' }));\n  toggleFaq = (f) => this.setState(s => ({ faqOpen: s.faqOpen === f.idx ? null : f.idx }));\n\n  renderVals() {\n    const s = this.state;\n    const selectedService = s.selectedService || this.services[0];\n    const selectedCategory = s.selectedCategory || this.categories[0];\n\n    const dowNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];\n    const toISO = (dt) => `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;\n    const today = new Date(); today.setHours(0, 0, 0, 0);\n    const selectedDateISO = s.selectedDateISO || toISO(today);\n\n    const viewMonthDate = new Date(today.getFullYear(), today.getMonth() + s.calendarMonthOffset, 1);\n    const calendarMonthLabel = viewMonthDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });\n    const firstWeekday = (viewMonthDate.getDay() + 6) % 7; // Mon=0
